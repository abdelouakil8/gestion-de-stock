name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # The app is Windows-only (pywin32 / win32print / PySide6 packaging), so we
    # run the whole matrix on Windows rather than excluding platform-specific
    # dependencies on a Linux runner.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Tests (pytest)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest
